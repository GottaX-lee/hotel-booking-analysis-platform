edition: 3.0.0
name: hotel-booking-analysis

resources:
  start_flask:
    component: fc3
    props:
      region: cn-hangzhou
      functionName: hotel-booking-analysis
      description: 'Hotel Booking Analysis Platform'
      runtime: custom.debian10
      code: ./
      memorySize: 1024
      timeout: 300
      instanceConcurrency: 1
      internetAccess: true
      environmentVariables:
        PYTHONPATH: /code
        FC_SERVER_PORT: '9000'
